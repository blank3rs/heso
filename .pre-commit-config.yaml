# Pre-commit hooks for the public heso repo.
#
# The only `.md` files that ship publicly are README.md, SECURITY.md, the
# per-crate / per-package READMEs, and the HESO spec. Everything else
# (agent findings, triage, research, regression dumps) stays gitignored.
# See AGENTS.md > "Where transient agent reports go" for the canonical
# homes. These hooks back that rule with a machine check so it can't
# drift on a busy commit.
#
# To enable locally: `pre-commit install` (writes a hook into .git/hooks/).
# CI runs the same config via .github/workflows/hygiene.yml.

repos:
  - repo: local
    hooks:
      - id: no-agent-md-in-public-repo
        name: Refuse agent-process .md outside the public allowlist
        language: fail
        entry: |
          Agent-process docs (findings, triage, regressions, research) belong in
          a gitignored directory. See AGENTS.md > "Where transient agent reports
          go". The only .md files that ship publicly are README.md, SECURITY.md,
          per-crate/per-package READMEs, and spec/HESO-*.md.
        files: \.md$
        exclude: ^(README\.md|SECURITY\.md|crates/[^/]+/README\.md|npm/heso/README\.md|npm/platforms/[^/]+/README\.md|spec/HESO-[0-9.]+\.md)$

      - id: no-rogue-root-md
        name: Refuse new root-level .md other than README / SECURITY
        language: fail
        entry: |
          The repo root only carries README.md and SECURITY.md. Anything else
          (AGENT_FINDINGS_*.md, REGRESSION_*.md, COMPATIBILITY.md, scratch
          notes) must live in a gitignored directory. See AGENTS.md > "Where
          transient agent reports go".
        files: ^[^/]+\.md$
        exclude: ^(README\.md|SECURITY\.md)$

      - id: spec-and-crates-md-shape
        name: spec/ holds only HESO-*.md, crates/* hold only README.md
        language: fail
        entry: |
          spec/ may only contain HESO-<version>.md files; crates/<name>/ may
          only contain README.md as its tracked .md surface. Move design notes
          to a gitignored directory and link from the spec / crate README if
          needed.
        files: ^(spec/.*\.md|crates/[^/]+/.*\.md)$
        exclude: ^(spec/HESO-[0-9.]+\.md|crates/[^/]+/README\.md)$
