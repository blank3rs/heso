# Supplementary setup.cfg.
#
# As of v0.0.2 we publish to PyPI from a five-platform CI matrix
# (.github/workflows/pypi.yml), so the wheel platform tag is no
# longer a single hardcoded `win_amd64`. The matrix passes it per
# job via `python -m build --config-setting=--build-option=--plat-name=<tag>`,
# and a follow-up `wheel tags --platform-tag <tag>` step normalises
# it if setuptools dropped the build-option (newer setuptools is
# inconsistent about honoring `--plat-name` through `python -m
# build`).
#
# We deliberately don't hardcode a plat_name here anymore. If
# somebody runs `python -m build` locally on Windows without passing
# `--config-setting`, the resulting wheel will be `py3-none-any`,
# which is fine for local testing and pinning isn't needed.
#
# Reference: https://wheel.readthedocs.io/en/stable/reference/wheel_tags.html
