# Supplementary setup.cfg — only used for the `[bdist_wheel]` section.
#
# All other config lives in pyproject.toml (PEP 621). The wheel
# platform tag has historically been a sore point: `[tool.distutils]`
# in pyproject.toml works on recent setuptools+wheel, but older
# installs and some CI sandboxes don't honor it. Keeping this file
# means `python setup.py bdist_wheel` and `python -m build --wheel`
# both produce a `py3-none-win_amd64` wheel even when the pyproject.toml
# table is ignored.
#
# Reference: https://wheel.readthedocs.io/en/stable/reference/wheel_tags.html

[bdist_wheel]
plat_name = win_amd64
